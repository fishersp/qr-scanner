<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>QR Сканер v3</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, sans-serif;
    background: #111; color: #fff;
    min-height: 100vh; display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  #camera-wrap {
    position: relative; width: 100%; max-width: 480px;
    margin: 0 auto; background: #000;
  }
  video { width: 100%; display: block; max-height: 40vh; object-fit: cover; }
  .finder {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 190px; height: 190px;
    border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
    pointer-events: none;
  }
  .finder::before, .finder::after,
  .finder-bl::before, .finder-bl::after {
    content: ''; position: absolute; width: 26px; height: 26px;
    border-color: #4caf50; border-style: solid;
  }
  .finder::before    { top:-2px;    left:-2px;  border-width:3px 0 0 3px; border-radius:8px 0 0 0; }
  .finder::after     { top:-2px;    right:-2px; border-width:3px 3px 0 0; border-radius:0 8px 0 0; }
  .finder-bl::before { bottom:-2px; left:-2px;  border-width:0 0 3px 3px; border-radius:0 0 0 8px; }
  .finder-bl::after  { bottom:-2px; right:-2px; border-width:0 3px 3px 0; border-radius:0 0 8px 0; }
  #flash {
    position: absolute; top:0; left:0; width:100%; height:100%;
    background: rgba(76,175,80,0.35);
    opacity: 0; transition: opacity 0.08s; pointer-events: none;
  }
  #flash.show { opacity: 1; }
  #status {
    text-align: center; padding: 8px 12px;
    font-size: 13px; color: #777; min-height: 32px; line-height: 1.4;
  }
  #status.ok  { color: #4caf50; }
  #status.dup { color: #ff9800; }
  #status.err { color: #f44336; font-size: 12px; }
  #results-wrap {
    flex: 1; max-width: 480px; width: 100%;
    margin: 0 auto; display: flex; flex-direction: column;
    padding: 0 12px 8px;
  }
  #results-header {
    display: flex; align-items: center;
    justify-content: space-between; padding: 6px 0;
  }
  #count { font-size: 13px; color: #666; }
  #pairs-box {
    flex: 1; width: 100%;
    background: #1a1a1a; border: 1px solid #2a2a2a;
    border-radius: 10px; padding: 12px;
    font-family: 'Courier New', monospace;
    font-size: 15px; color: #e0e0e0;
    resize: none; outline: none;
    min-height: 150px; line-height: 1.8;
    -webkit-user-select: text; user-select: text;
  }
  #pairs-box::placeholder { color: #444; font-size: 13px; }
  #toolbar {
    max-width: 480px; width: 100%;
    margin: 0 auto; padding: 8px 12px 20px; display: flex; gap: 8px;
  }
  button {
    flex: 1; padding: 14px 8px; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #btn-copy  { background: #2e7d32; color: #fff; }
  #btn-clear { background: #1e1e1e; color: #f44336; border: 1px solid #333; }
  #btn-copy:active  { background: #1b5e20; }
  #btn-clear:active { opacity: 0.7; }
</style>
</head>
<body>

<div id="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <div class="finder"><div class="finder-bl"></div></div>
  <div id="flash"></div>
</div>

<div id="status">Запуск камеры...</div>

<div id="results-wrap">
  <div id="results-header"><span id="count">0 пар</span></div>
  <textarea id="pairs-box" placeholder="Здесь появятся пары:&#10;*BfBmCxOJ 25508055827&#10;..."></textarea>
</div>

<div id="toolbar">
  <button id="btn-copy" onclick="copyAll()">📋 Скопировать все</button>
  <button id="btn-clear" onclick="clearAll()">🗑 Очистить</button>
</div>

<script>
// ── декодер ───────────────────────────────────────────────────
function qrToNumber(code) {
  code = code.trim();
  if (code.startsWith('*')) code = code.slice(1);
  code += '='.repeat((4 - code.length % 4) % 4);
  const bin = atob(code);
  let v = 0n;
  for (let i = 0; i < bin.length; i++)
    v = (v << 8n) | BigInt(bin.charCodeAt(i));
  return (v >> 8n).toString();
}

const statusEl = document.getElementById('status');
const pairsBox = document.getElementById('pairs-box');
const countEl  = document.getElementById('count');
const flashEl  = document.getElementById('flash');
const video    = document.getElementById('video');

let pairs    = [];
let lastRaw  = '';
let lastTime = 0;
let animId   = null;

// ── jsQR через CDN (грузим динамически) ───────────────────────
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

// ── запуск камеры напрямую через getUserMedia + jsQR ─────────
async function startCamera() {
  try {
    await loadScript('https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js');
  } catch(e) {
    try {
      await loadScript('https://unpkg.com/jsqr@1.4.0/dist/jsQR.js');
    } catch(e2) {
      statusEl.className = 'err';
      statusEl.textContent = 'Не удалось загрузить библиотеку сканера';
      return;
    }
  }

  let stream;
  try {
    // сначала пробуем заднюю камеру
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { exact: 'environment' } }
    });
  } catch(e) {
    try {
      // fallback — любая камера
      stream = await navigator.mediaDevices.getUserMedia({ video: true });
    } catch(e2) {
      statusEl.className = 'err';
      statusEl.textContent = 'Нет доступа к камере: ' + e2.message;
      return;
    }
  }

  video.srcObject = stream;
  await new Promise(r => video.addEventListener('loadedmetadata', r, { once: true }));
  await video.play();

  statusEl.textContent = 'Наведите камеру на QR-код';

  // canvas для захвата кадров
  const canvas = document.createElement('canvas');
  const ctx    = canvas.getContext('2d');

  function tick() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, img.width, img.height, {
        inversionAttempts: 'dontInvert'
      });
      if (code) handleCode(code.data);
    }
    animId = requestAnimationFrame(tick);
  }
  animId = requestAnimationFrame(tick);
}

function handleCode(raw) {
  raw = (raw || '').trim();
  if (!raw) return;

  let number;
  try { number = qrToNumber(raw); }
  catch(e) { return; }

  const now = Date.now();
  if (raw === lastRaw && now - lastTime < 2000) return;
  lastRaw  = raw;
  lastTime = now;

  flashEl.classList.add('show');
  setTimeout(() => flashEl.classList.remove('show'), 100);

  if (pairs.some(p => p.raw === raw)) {
    statusEl.className = 'dup';
    statusEl.textContent = '⚠️ Уже есть: ' + number;
  } else {
    pairs.push({ raw, number });
    pairsBox.value = pairs.map(p => p.raw + ' ' + p.number).join('\n');
    pairsBox.scrollTop = pairsBox.scrollHeight;
    const n = pairs.length;
    countEl.textContent = n + ' ' + plural(n, 'пара', 'пары', 'пар');
    statusEl.className = 'ok';
    statusEl.textContent = '✓ ' + raw + '  ' + number;
  }
  setTimeout(() => {
    statusEl.className = '';
    statusEl.textContent = 'Наведите камеру на QR-код';
  }, 1800);
}

function plural(n, one, few, many) {
  const m = n % 10, h = n % 100;
  if (m === 1 && h !== 11) return one;
  if (m >= 2 && m <= 4 && (h < 10 || h >= 20)) return few;
  return many;
}

function copyAll() {
  if (!pairs.length) return;
  const text = pairs.map(p => p.raw + ' ' + p.number).join('\n');
  const btn  = document.getElementById('btn-copy');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(() => showCopied(btn))
      .catch(() => fallbackCopy(text, btn));
  } else {
    fallbackCopy(text, btn);
  }
}

function fallbackCopy(text, btn) {
  pairsBox.focus();
  pairsBox.setSelectionRange(0, pairsBox.value.length);
  document.execCommand('copy') ? showCopied(btn) : (btn.textContent = '👆 Выделите вручную');
  setTimeout(() => btn.textContent = '📋 Скопировать все', 2500);
}

function showCopied(btn) {
  btn.textContent = '✓ Скопировано!';
  setTimeout(() => btn.textContent = '📋 Скопировать все', 1800);
}

function clearAll() {
  if (!pairs.length) return;
  if (confirm('Очистить все ' + pairs.length + ' пар?')) {
    pairs = []; lastRaw = '';
    pairsBox.value = '';
    countEl.textContent = '0 пар';
  }
}

startCamera();
</script>
</body>
</html>
